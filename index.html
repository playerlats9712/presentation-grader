<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewertungsbogen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 350px;
        }
        .rating-radio:checked + label {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* PRINT STYLES - Radikaler Fix */
        @media print {
            @page { size: A4; margin: 20mm; }
            
            /* Alles auf Standard zurücksetzen */
            * { 
                background: transparent !important; 
                color: black !important; 
                text-shadow: none !important; 
                box-shadow: none !important;
                visibility: visible !important;
            }

            html, body { 
                background: white !important; 
                margin: 0 !important; 
                padding: 0 !important;
                width: 100% !important;
            }

            .no-print { display: none !important; }
            
            /* Layout für Druck linearisieren */
            .max-w-7xl { max-width: 100% !important; width: 100% !important; }
            .grid { display: block !important; }
            section, .bg-slate-900, .bg-slate-950 { 
                display: block !important; 
                width: 100% !important; 
                border: none !important; 
                margin-bottom: 20px !important; 
                padding: 0 !important;
            }

            h1 { font-size: 24pt !important; margin-bottom: 10px !important; border-bottom: 2px solid black !important; }
            h2 { font-size: 18pt !important; margin-top: 20px !important; border-bottom: 1px solid black !important; }
            
            /* Interaktive Kriterienliste verstecken */
            #criteria-container { display: none !important; }
            
            /* Druck-Tabelle erzwingen */
            #print-table-container { 
                display: block !important; 
                width: 100% !important; 
                margin-top: 20px !important;
            }
            table { width: 100% !important; border-collapse: collapse !important; margin-bottom: 30px !important; }
            th, td { border: 1px solid #ccc !important; padding: 8px !important; text-align: left !important; }
            th { background: #f0f0f0 !important; }

            /* Diagramm fixieren */
            .lg\:col-span-4 { display: block !important; margin-top: 30px !important; }
            .chart-container { width: 100% !important; max-width: 400px !important; height: 300px !important; margin: 0 auto !important; }
            
            /* Score fixieren */
            #total-score { font-size: 36pt !important; color: black !important; text-align: center !important; margin: 20px 0 !important; }
            
            textarea, input { 
                border: 1px solid #999 !important; 
                padding: 10px !important; 
                width: 100% !important;
                min-height: 50px !important;
            }
        }

        #print-table-container { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="main-content">
    
    <header class="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white">Präsentations-Feedback</h1>
            <p class="text-slate-400 mt-2 text-lg">Individueller Ergebnisbericht</p>
        </div>
        <div class="no-print">
            <button onclick="prepareAndPrint()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg shadow-lg font-bold transition-all active:scale-95">
                Als PDF exportieren
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8 space-y-8">
            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-white border-b border-slate-800 pb-2">Informationen</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Referent/in</label>
                        <input type="text" id="ref-name" class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-2 outline-none" placeholder="Name">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Thema</label>
                        <input type="text" id="ref-topic" class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-2 outline-none" placeholder="Titel">
                    </div>
                </div>
            </section>

            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-6">
                    <h2 class="text-xl font-semibold text-white">Bewertungskriterien</h2>
                    <div class="no-print flex gap-2">
                        <input type="text" id="new-criterion-input" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-3 py-1 outline-none" placeholder="Neu...">
                        <button onclick="addCriterion()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded-md text-sm font-bold">+</button>
                    </div>
                </div>
                
                <div class="space-y-4" id="criteria-container"></div>

                <!-- Print Ansicht: Tabelle -->
                <div id="print-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Kriterium</th>
                                <th style="text-align: right;">Punkte</th>
                            </tr>
                        </thead>
                        <tbody id="print-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-white border-b border-slate-800 pb-2">Anmerkungen</h2>
                <textarea id="feedback-text" class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-3 outline-none h-32" placeholder="Kommentare..."></textarea>
            </section>
        </div>

        <div class="lg:col-span-4">
            <div class="bg-slate-900 rounded-xl shadow-2xl border border-slate-800 p-6 text-center">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Gesamtergebnis</h2>
                <div class="text-6xl font-black text-blue-500" id="total-score">0.0</div>
                <h3 class="font-semibold text-white my-6">Visualisierung</h3>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let config = [
        { id: 'c_1', title: 'Ausdrucksweise' },
        { id: 'c_2', title: 'Qualität der Präsentation' },
        { id: 'c_3', title: 'Korrektheit der Infos' },
        { id: 'c_4', title: 'Persönlicher Nutzen/Wirkung' }
    ];
    let scores = {};
    let radarChartInstance = null;

    function renderCriteria() {
        const container = document.getElementById('criteria-container');
        container.innerHTML = config.map(item => `
            <div class="flex items-center justify-between gap-4 p-4 bg-slate-800/30 rounded-lg border border-slate-800/50">
                <div class="flex-grow flex items-center gap-2">
                    <input type="text" value="${item.title}" onchange="updateTitle('${item.id}', this.value)" class="bg-transparent border-none text-slate-200 font-bold w-full outline-none p-0">
                    <button onclick="removeCriterion('${item.id}')" class="no-print text-slate-600 hover:text-red-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="flex gap-1">
                    ${[1,2,3,4,5].map(val => `
                        <input type="radio" name="${item.id}" id="${item.id}_${val}" value="${val}" class="rating-radio sr-only" ${scores[item.id] == val ? 'checked' : ''} onchange="updateScore('${item.id}', ${val})">
                        <label for="${item.id}_${val}" class="w-8 h-8 flex items-center justify-center rounded border border-slate-700 cursor-pointer text-slate-400 font-bold text-xs">
                            ${val}
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function updateScore(id, value) { scores[id] = value; calculateTotal(); }
    function updateTitle(id, val) { const item = config.find(c => c.id === id); if(item) { item.title = val; updateChartLabels(); } }
    function addCriterion() {
        const input = document.getElementById('new-criterion-input');
        if(!input.value) return;
        const newId = 'c_' + Date.now();
        config.push({ id: newId, title: input.value });
        input.value = "";
        renderCriteria();
        updateChartLabels();
    }
    function removeCriterion(id) { config = config.filter(c => c.id !== id); delete scores[id]; renderCriteria(); updateChartLabels(); calculateTotal(); }

    function calculateTotal() {
        const vals = Object.values(scores).filter(v => v > 0);
        const avg = vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
        document.getElementById('total-score').textContent = avg.toFixed(1);
        updateChartData();
    }

    function initChart() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: config.map(c => c.title),
                datasets: [{
                    data: config.map(() => 0),
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: '#3b82f6',
                    borderWidth: 2
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: { r: { suggestedMin: 0, suggestedMax: 5, ticks: { display: false, stepSize: 1 } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function updateChartLabels() { if(radarChartInstance) { radarChartInstance.data.labels = config.map(c => c.title); radarChartInstance.update(); } }
    function updateChartData() { if(radarChartInstance) { radarChartInstance.data.datasets[0].data = config.map(c => scores[c.id] || 0); radarChartInstance.update(); } }

    function prepareAndPrint() {
        const tbody = document.getElementById('print-table-body');
        tbody.innerHTML = config.map(c => `<tr><td>${c.title}</td><td style="text-align:right">${scores[c.id] || '-'}</td></tr>`).join('');
        setTimeout(() => window.print(), 200);
    }

    window.onload = () => { renderCriteria(); initChart(); };
</script>
</body>
</html>
