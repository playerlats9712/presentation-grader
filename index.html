<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiver Bewertungsbogen - Dynamisch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 400px;
            }
        }
        .rating-radio:checked + label {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print, .action-btn { display: none !important; }
            .bg-slate-800, .bg-slate-900, .bg-slate-950 { background: white !important; color: black !important; border: 1px solid #ddd !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased">

<!-- Chosen Palette: Deep Ocean Dark with Dynamic Controls -->
<!-- Application Structure Plan: Erweiterte SPA mit CRUD-Funktionalität für Bewertungskriterien. Nutzer können Kriterien hinzufügen und löschen. Die State-Logik (scores & config) ist reaktiv aufgebaut, sodass das Radar-Chart und die Durchschnittsberechnung immer mit der aktuellen Liste synchronisiert bleiben. -->
<!-- Visualization & Content Choices: Radar Chart passt Achsenanzahl dynamisch an. UI-Buttons für Löschen (Trash-Symbol via Unicode) und Hinzufügen. -->
<!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <header class="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white">Präsentations-Feedback</h1>
            <p class="text-slate-400 mt-2 text-lg">Individueller Bewertungsbogen mit dynamischen Kriterien.</p>
        </div>
        <div class="no-print">
            <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg border border-slate-700 transition-all text-sm font-medium">
                Als PDF exportieren
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8 space-y-8">
            
            <!-- Stammdaten -->
            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-white border-b border-slate-800 pb-2">Allgemeine Informationen</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Referent/in</label>
                        <input type="text" id="ref-name" class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Name eingeben">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Thema</label>
                        <input type="text" id="ref-topic" class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Titel der Präsentation">
                    </div>
                </div>
            </section>

            <!-- Kriterien Management -->
            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-2 mb-6 gap-4">
                    <h2 class="text-xl font-semibold text-white">Bewertungskriterien</h2>
                    
                    <div class="no-print flex w-full sm:w-auto gap-2">
                        <input type="text" id="new-criterion-input" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-3 py-2 focus:ring-1 focus:ring-blue-500 outline-none flex-grow" placeholder="Neues Kriterium...">
                        <button onclick="addCriterion()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-bold transition-all active:scale-95">
                            +
                        </button>
                    </div>
                </div>
                
                <div class="space-y-4" id="criteria-container">
                    <!-- Wird per JS befüllt -->
                </div>
            </section>

            <section class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-white border-b border-slate-800 pb-2">Zusätzliche Anmerkungen</h2>
                <textarea class="w-full bg-slate-800 border border-slate-700 text-white rounded-md p-3 focus:ring-2 focus:ring-blue-500 outline-none h-32 transition-all" placeholder="Hier ist Platz für individuelles Feedback..."></textarea>
            </section>

        </div>

        <!-- Dashboard -->
        <div class="lg:col-span-4">
            <div class="bg-slate-900 rounded-xl shadow-2xl border border-slate-800 sticky top-6 overflow-hidden">
                
                <div class="p-8 border-b border-slate-800 bg-slate-900/50 text-center">
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Durchschnitts-Score</h2>
                    <div class="text-6xl font-black text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]" id="total-score">0.0</div>
                    <div class="text-slate-500 mt-2 text-sm font-medium">Skala 1.0 - 5.0</div>
                </div>

                <div class="p-6">
                    <h3 class="font-semibold text-white mb-6 text-center">Leistungsprofil</h3>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                    
                    <div class="mt-8 text-center text-xs text-slate-500 italic">
                        Das Diagramm aktualisiert sich automatisch bei Änderungen der Kriterien.
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // Standard-Konfiguration
    let config = [
        { id: 'c_' + Date.now() + 1, title: 'Ausdrucksweise', desc: 'Rhetorik & Verständlichkeit' },
        { id: 'c_' + Date.now() + 2, title: 'Qualität der Präsentation', desc: 'Design & Struktur' },
        { id: 'c_' + Date.now() + 3, title: 'Korrektheit der Infos', desc: 'Fachliche Tiefe' },
        { id: 'c_' + Date.now() + 4, title: 'Persönlicher Nutzen/Wirkung', desc: 'Mehrwert & Eindruck' }
    ];

    let scores = {};
    let radarChartInstance = null;

    // Kriterium hinzufügen
    function addCriterion() {
        const input = document.getElementById('new-criterion-input');
        const title = input.value.trim();
        
        if (title === "") return;

        const newId = 'c_' + Date.now();
        config.push({
            id: newId,
            title: title,
            desc: 'Individuell hinzugefügt'
        });
        
        scores[newId] = 0;
        input.value = "";
        renderCriteria();
        updateChartStructure();
        calculateTotal();
    }

    // Kriterium löschen
    function removeCriterion(id) {
        config = config.filter(c => c.id !== id);
        delete scores[id];
        renderCriteria();
        updateChartStructure();
        calculateTotal();
    }

    function renderCriteria() {
        const container = document.getElementById('criteria-container');
        if (config.length === 0) {
            container.innerHTML = '<p class="text-slate-500 text-center py-8">Keine Kriterien vorhanden. Füge oben welche hinzu.</p>';
            return;
        }

        let html = '';
        config.forEach(item => {
            if (!(item.id in scores)) scores[item.id] = 0;
            
            html += `
                <div class="group relative flex flex-col md:flex-row md:items-center justify-between gap-4 p-4 bg-slate-800/30 rounded-lg border border-slate-800/50 hover:border-slate-700 transition-all">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <h4 class="font-bold text-slate-200">${item.title}</h4>
                            <button onclick="removeCriterion('${item.id}')" class="no-print opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-500 transition-all text-xs font-bold px-2 py-1" title="Löschen">
                                &#10005;
                            </button>
                        </div>
                        <p class="text-[11px] text-slate-500 uppercase tracking-wide">${item.desc}</p>
                    </div>
                    <div class="flex items-center gap-1">
                        ${[1,2,3,4,5].map(val => `
                            <div class="relative">
                                <input type="radio" name="${item.id}" id="${item.id}_${val}" value="${val}" 
                                       class="rating-radio sr-only" 
                                       ${scores[item.id] === val ? 'checked' : ''}
                                       onchange="updateScore('${item.id}', ${val})">
                                <label for="${item.id}_${val}" class="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-700 cursor-pointer hover:bg-slate-700 text-slate-400 font-bold transition-all text-sm">
                                    ${val}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function updateScore(id, value) {
        scores[id] = value;
        calculateTotal();
    }

    function calculateTotal() {
        const values = Object.values(scores).filter(v => v > 0);
        const avg = values.length > 0 ? values.reduce((a, b) => a + b, 0) / values.length : 0;
        
        const scoreEl = document.getElementById('total-score');
        scoreEl.textContent = avg.toFixed(1);
        
        // Dynamische Farbwahl
        if(avg >= 4.0) scoreEl.className = "text-6xl font-black text-emerald-400 drop-shadow-[0_0_10px_#10b98155]";
        else if(avg >= 2.5) scoreEl.className = "text-6xl font-black text-blue-500 drop-shadow-[0_0_10px_#3b82f655]";
        else if(avg > 0) scoreEl.className = "text-6xl font-black text-amber-500 drop-shadow-[0_0_10px_#f59e0b55]";
        else scoreEl.className = "text-6xl font-black text-slate-700";
        
        updateChartData();
    }

    function initChart() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: config.map(c => c.title),
                datasets: [{
                    data: config.map(() => 0),
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: '#3b82f6',
                    pointBackgroundColor: '#3b82f6',
                    pointBorderColor: '#0f172a',
                    borderWidth: 3,
                    pointRadius: 4
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    r: {
                        angleLines: { color: '#334155' },
                        grid: { color: '#334155' },
                        pointLabels: { color: '#94a3b8', font: { weight: 'bold', size: 10 } },
                        ticks: { display: false, stepSize: 1 },
                        suggestedMin: 0, suggestedMax: 5
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // Chart-Struktur (Labels) aktualisieren
    function updateChartStructure() {
        if(radarChartInstance) {
            radarChartInstance.data.labels = config.map(c => c.title);
            radarChartInstance.update();
        }
    }

    // Chart-Daten (Werte) aktualisieren
    function updateChartData() {
        if(radarChartInstance) {
            radarChartInstance.data.datasets[0].data = config.map(c => scores[c.id] || 0);
            radarChartInstance.update();
        }
    }

    // Enter-Taste für neues Kriterium
    document.getElementById('new-criterion-input')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addCriterion();
    });

    window.onload = () => {
        renderCriteria();
        initChart();
    };
</script>

</body>
</html>
